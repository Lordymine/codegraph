name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload binaries

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: codegraph-linux-amd64
          - os: macos-latest
            asset: codegraph-darwin-arm64
          - os: windows-latest
            asset: codegraph-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1" # tree-sitter is cgo; each runner builds natively with its own C compiler
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        shell: bash
        run: go build -trimpath -ldflags "-s -w" -o "${{ matrix.asset }}" ./cmd/codegraph

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/codegraph-*
          generate_release_notes: true
          fail_on_unmatched_files: true
